<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>

function doSum() {

var a = myfrm.txt1.value

var b= myfrm.txt2.value

var c = parseInt(a) + parseInt(b)

//document.write("Sum is "+c)

myfrm.ans.value = "Sum is "+ c

}

</script>
</head>
<body>
    <form id="myfrm">

No1: <input type="text" name="txt1" /> <br />

No2: <input type="text" name="txt2" /> <br />

<input type="button" onclick="doSum()" value="Sum" />

<input type="text" name="ans" readonly disabled/>

</form>
</body>
</html>
