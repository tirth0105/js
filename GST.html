<!DOCTYPE html>
<html>
<head>
    <title>GST Calculator</title>

    <script>
        function calculateGST() {

            var amount = parseFloat(document.getElementById("amount").value);
            var gstRate = parseFloat(document.getElementById("gstRate").value);

            var gstAmount = (amount * gstRate) / 100;
            var totalAmount = amount + gstAmount;

            document.getElementById("result").innerHTML =
                "Amount: ₹ " + amount.toFixed(2) + "<br>" +
                "GST (" + gstRate + "%): ₹ " + gstAmount.toFixed(2) + "<br>" +
                "Total: ₹ " + totalAmount.toFixed(2);
        }
    </script>

    <style>
        body {
            text-align: center;
            font-family: Times New Roman;
        }

        h1 {
            margin-top: 30px;
        }

        input, select {
            font-size: 30px;
            padding: 5px;
            width: 300px;
        }

        button {
            font-size: 30px;
            padding: 10px 20px;
            margin-top: 20px;
        }

        #result {
            margin-top: 30px;
            font-size: 35px;
        }

        label {
            font-size: 35px;
        }
    </style>
</head>

<body>

    <h1>GST Calculator</h1>

    <br><br>

    <label>Enter Amount (in INR): </label>
    <input type="number" id="amount" value="10000">

    <br><br><br>

    <label>Select GST Rate: </label>

    <select id="gstRate">
        <option value="5">5%</option>
        <option value="12">12%</option>
        <option value="18" selected>18%</option>
        <option value="28">28%</option>
    </select>

    <br><br><br>

    <button onclick="calculateGST()">Calculate GST</button>

    <div id="result"></div>

</body>
</html>
