<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        document.write("Hello World");
        var a=10
        var b=20
        var c=a+b
        document.write("<br> The Value of a is: "+a)
        document.write("<br> The Value of b is: "+b)
        document.write("<br> The Sum is: "+c)

        document.write("<table border='1'>")
        for (var i=0; i<100; i++){
            document.write("<tr> ")
            if(i%2==0){
                    document.write("<td bgcolor='red'> "+i+" </td>")
            }
            else{
                    document.write("<td bgcolor='blue'> "+i+" </td>")
            }
            document.write("</tr>")

        }
        document.write("</table>")
        
    </script>
</head>
<body>
    
</body>
</html>
